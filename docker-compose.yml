###############################################################################
# Sense Platform — Phase 1 Stack
# Self-hosted WebRTC + AI Agent (no cloud dependencies)
#
# Services:
#   sense-relay   — LiveKit-based WebRTC media server (port 7880)
#   redis         — Room state + pub/sub for Sense Relay
#   sense-mind    — AI agent engine (joins relay room automatically)
#
# Quick start:
#   cp .env.example .env       # add your LLM API key
#   docker compose up
###############################################################################

version: "3.9"

services:

  # ─────────────────────────────────────────────────────────────────────────
  # Sense Relay — Self-hosted WebRTC SFU
  # Built on LiveKit (Apache 2.0). No external signaling cloud.
  # ─────────────────────────────────────────────────────────────────────────
  sense-relay:
    image: livekit/livekit-server:latest
    command: --config /etc/sense-relay/sense-relay.yaml
    ports:
      - "7880:7880"            # WebSocket / HTTP API
      - "7881:7881/tcp"        # WebRTC TCP fallback
      - "50000-50020:50000-50020/udp"  # WebRTC UDP media (narrow range for dev)
    volumes:
      - ./services/relay/sense-relay.yaml:/etc/sense-relay/sense-relay.yaml:ro
    environment:
      - LIVEKIT_KEYS=sense_gateway:secret_change_in_production
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Redis — Distributed room state and pub/sub for Sense Relay
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Sense Mind — AI Agent Engine
  # Joins the "default" Sense Relay room automatically on startup.
  # Mount your agent script at /app/agent.py or use the example below.
  # ─────────────────────────────────────────────────────────────────────────
  sense-mind:
    build:
      context: ./services/mind
      dockerfile: Dockerfile
    environment:
      # Relay connection
      SENSE_RELAY_URL: "ws://sense-relay:7880"
      SENSE_RELAY_API_KEY: "sense_gateway"
      SENSE_RELAY_SECRET: "secret_change_in_production"
      SENSE_ROOM: "default"

      # LLM (set your key in .env or override here)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"

      # STT / TTS
      DEEPGRAM_API_KEY: "${DEEPGRAM_API_KEY:-}"
      ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY:-}"

      # Agent HTTP API
      SENSE_MIND_PORT: "8080"
    ports:
      - "8080:8080"            # Health + control API
    depends_on:
      sense-relay:
        condition: service_healthy
    volumes:
      - ./examples:/app/examples:ro   # mount example agents
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

###############################################################################
# Shared network — all services communicate on sense-net
###############################################################################
networks:
  default:
    name: sense-net
    driver: bridge
